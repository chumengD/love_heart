<svg width="2499" height="1083" viewBox="0 0 2499 1083" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>微信聊天界面 Figma 可导入设计稿</title>
  <desc>根据截图重建的可编辑矢量设计。导入 Figma 后可继续调整图层、文字、颜色与图标。</desc>

  <defs>
    <style>
      .font-main { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; }
      .font-ui { font-family: "Microsoft YaHei UI", "Microsoft YaHei", Arial, sans-serif; }
    </style>
    <filter id="inputShadow" x="960" y="975" width="676" height="100" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="2.5" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <g id="Canvas / Screenshot Size">
    <rect id="Background Left Matte" x="0" y="0" width="426" height="1083" fill="#000000"/>
    <rect id="Background Right Matte" x="2112" y="0" width="387" height="1083" fill="#000000"/>

    <g id="WeChat Window">
      <rect id="Sidebar" x="426" y="0" width="146" height="1083" fill="#3F4049"/>
      <rect id="Chat Content Background" x="572" y="0" width="1540" height="965" fill="#F5F5F5"/>
      <rect id="Bottom Input Bar" x="572" y="965" width="1540" height="118" fill="#202622"/>

      <g id="Nav / WeChat Active">
        <path id="WeChat Bubble Body" d="M497.3 45.8C517.4 38.9 540.2 49.3 544.3 66.7C548.9 86.3 529.5 103.1 505.7 103.1C499.1 103.1 492.9 101.8 487.6 99.5L475.7 105.1L480.5 93.5C471.8 87.4 467.6 78.3 469.7 68.9C471.9 58.9 482 50.7 497.3 45.8Z" fill="#05BF22"/>
        <text id="WeChat Label" class="font-ui" x="445" y="153" fill="#05BF22" font-size="33" font-weight="400">WeChat</text>
      </g>

      <g id="Nav / Moments Inactive" opacity="0.55">
        <circle id="Moments Icon Base" cx="498" cy="268" r="31" fill="#6E7074"/>
        <path d="M498 237L508.2 266.5L538.5 260.1L517.9 283.2L538.5 306.3L508.2 299.9L498 329.4L487.8 299.9L457.5 306.3L478.1 283.2L457.5 260.1L487.8 266.5L498 237Z" fill="#3F4049" opacity="0.65"/>
        <circle cx="498" cy="268" r="2.8" fill="#3F4049"/>
        <text id="Moments Label" class="font-ui" x="453" y="346" fill="#B0B1B5" font-size="31" font-weight="400">朋友圈</text>
      </g>

      <g id="Message Row">
        <g id="Avatar">
          <rect x="606" y="31" width="104" height="104" fill="#FFF7A9"/>
          <g id="Avatar Line Art" stroke="#C49A42" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">
            <path d="M637 61C633 74 632 90 638 103"/>
            <path d="M682 61C688 76 687 91 680 105"/>
            <path d="M642 55C650 43 669 42 677 55"/>
            <path d="M643 70C647 61 653 55 663 52"/>
            <path d="M677 70C672 61 666 55 657 52"/>
            <path d="M648 78C645 86 646 99 653 107"/>
            <path d="M672 78C675 87 674 99 666 107"/>
            <path d="M649 102C653 112 666 113 671 102"/>
            <path d="M629 83C631 79 635 79 638 84"/>
            <path d="M686 83C683 79 679 79 676 84"/>
            <path d="M633 115C646 126 670 127 686 115"/>
            <path d="M621 112C626 98 622 81 628 66"/>
            <path d="M695 111C690 98 694 82 688 66"/>
          </g>
          <g id="Avatar Face" fill="#B26D34">
            <circle cx="650" cy="81" r="2.7"/>
            <circle cx="669" cy="81" r="2.7"/>
            <path d="M658 91C660 93 662 93 664 91" stroke="#B26D34" stroke-width="1.7" stroke-linecap="round"/>
            <path d="M653 99C657 102 663 102 667 99" stroke="#B26D34" stroke-width="1.8" stroke-linecap="round"/>
          </g>
          <g id="Avatar Blush" fill="#E58E79" opacity="0.55">
            <ellipse cx="642" cy="93" rx="5" ry="2.5"/>
            <ellipse cx="676" cy="93" rx="5" ry="2.5"/>
          </g>
        </g>

        <rect id="Message Bubble" x="730" y="31" width="321" height="99" fill="#FFFFFF"/>
        <text id="Message Text" class="font-main" x="766" y="91" fill="#333942" font-size="42" font-weight="400">我的发圈丢了</text>
      </g>

      <g id="Bottom / Voice Button">
        <circle cx="640" cy="1028" r="28" fill="#202622" stroke="#C8C9CC" stroke-width="3"/>
        <path d="M622 1020C626 1024 626 1032 622 1036" stroke="#DDE1E2" stroke-width="3.2" stroke-linecap="round"/>
        <path d="M631 1014C639 1021 639 1036 631 1043" stroke="#DDE1E2" stroke-width="3.2" stroke-linecap="round"/>
        <circle cx="617" cy="1028" r="2.7" fill="#DDE1E2"/>
      </g>

      <g id="Bottom / Input" filter="url(#inputShadow)">
        <rect x="968" y="981" width="662" height="88" rx="8" fill="#FFFFFF" stroke="#AEB0B4" stroke-width="2"/>
        <path d="M995 1004V1050" stroke="#2F9DDA" stroke-width="5" stroke-linecap="round"/>
        <text id="Input Placeholder" class="font-main" x="1010" y="1042" fill="#A9A9A9" font-size="40" font-weight="400">发送消息...</text>
      </g>

      <g id="Bottom / Emoji Button">
        <circle cx="1929" cy="1030" r="28" stroke="#D8DADD" stroke-width="4"/>
        <circle cx="1918" cy="1021" r="3.7" fill="#D8DADD"/>
        <circle cx="1940" cy="1021" r="3.7" fill="#D8DADD"/>
        <path d="M1912 1036C1920 1047 1938 1047 1946 1036" stroke="#D8DADD" stroke-width="4" stroke-linecap="round"/>
      </g>

      <g id="Bottom / Add Button">
        <circle cx="2040" cy="1028" r="28" stroke="#D8DADD" stroke-width="4"/>
        <path d="M2040 1010V1046" stroke="#D8DADD" stroke-width="5" stroke-linecap="round"/>
        <path d="M2022 1028H2058" stroke="#D8DADD" stroke-width="5" stroke-linecap="round"/>
      </g>
    </g>
  </g>
</svg>
